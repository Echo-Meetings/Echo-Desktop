name: Build whisper.cpp ARM64 Windows

on:
  workflow_dispatch:
    inputs:
      whisper_version:
        description: 'whisper.cpp version tag (e.g. v1.8.4)'
        required: true
        default: 'v1.8.4'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-11-arm
    steps:
      - name: Checkout whisper.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/whisper.cpp
          ref: ${{ github.event.inputs.whisper_version }}

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      - name: Build with CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -A ARM64
          cmake --build build --config Release --target whisper-cli

      - name: Package binaries
        run: |
          mkdir package
          copy build\bin\Release\whisper-cli.exe package\
          copy build\bin\Release\whisper.dll package\
          copy build\bin\Release\ggml.dll package\
          copy build\bin\Release\ggml-base.dll package\
          copy build\bin\Release\ggml-cpu.dll package\
        shell: cmd

      - name: Create zip
        run: Compress-Archive -Path package\* -DestinationPath whisper-bin-arm64-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-arm64-windows
          path: whisper-bin-arm64-windows.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: whisper-${{ github.event.inputs.whisper_version }}-arm64
          name: 'whisper.cpp ${{ github.event.inputs.whisper_version }} ARM64 Windows'
          files: whisper-bin-arm64-windows.zip
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
