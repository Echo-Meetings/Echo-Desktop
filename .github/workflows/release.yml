name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package
        run: npx electron-vite build && npx electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}
          path: release/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package
        run: npx electron-vite build && npx electron-builder --win --${{ matrix.arch }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-${{ matrix.arch }}
          path: release/*.zip
          if-no-files-found: error

  # Cross-compile whisper.cpp for ARM64 Windows using Clang (MSVC not supported for ARM)
  build-whisper-arm64:
    runs-on: windows-latest
    steps:
      - name: Checkout whisper.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/whisper.cpp
          ref: v1.8.4

      - name: Cross-compile for ARM64 with Clang
        run: |
          cmake -B build -T ClangCL -A ARM64 -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -DGGML_OPENMP=OFF -DGGML_NATIVE=OFF
          cmake --build build --config Release --target whisper-cli

      - name: Package binaries
        run: |
          New-Item -ItemType Directory -Path package -Force
          Copy-Item build\bin\Release\whisper-cli.exe package\
          Get-ChildItem build\bin\Release\*.dll | Copy-Item -Destination package\
          Compress-Archive -Path package\* -DestinationPath whisper-bin-arm64-windows.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-arm64
          path: whisper-bin-arm64-windows.zip

  # Build whisper-cli universal binary for macOS (arm64 + x86_64)
  build-whisper-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout whisper.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/whisper.cpp
          ref: v1.8.4

      - name: Build universal binary
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DGGML_NATIVE=OFF \
            -DGGML_METAL=OFF \
            -DGGML_OPENMP=OFF
          cmake --build build --config Release --target whisper-cli

      - name: Sign and package
        run: |
          codesign --force --sign - build/bin/whisper-cli
          tar czf whisper-bin-universal-macos.tar.gz -C build/bin whisper-cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-macos
          path: whisper-bin-universal-macos.tar.gz

  # Build whisper-cli for Linux x64
  build-whisper-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout whisper.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/whisper.cpp
          ref: v1.8.4

      - name: Build static binary
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DGGML_NATIVE=OFF \
            -DGGML_OPENMP=OFF \
            -DBUILD_SHARED_LIBS=OFF
          cmake --build build --config Release --target whisper-cli

      - name: Package
        run: tar czf whisper-bin-x64-linux.tar.gz -C build/bin whisper-cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whisper-linux
          path: whisper-bin-x64-linux.tar.gz

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package
        run: npx electron-vite build && npx electron-builder --linux --${{ matrix.arch }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            release/*.AppImage
            release/*.deb
          if-no-files-found: error

  release:
    needs: [build-mac, build-windows, build-whisper-arm64, build-whisper-macos, build-whisper-linux, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
