name: CI

on:
  push:
    branches: [main, dev, *-dev]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  build:
    needs: typecheck
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: npx electron-vite build && npx electron-builder --mac --arm64
          - os: windows-latest
            script: npx electron-vite build && npx electron-builder --win --x64
          - os: ubuntu-latest
            script: npx electron-vite build && npx electron-builder --linux --x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & package
        run: ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
